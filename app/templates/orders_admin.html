{% extends "base.html" %}
{% block title %}Pedidos{% endblock %}
{% block page_title %}Administración de Pedidos{% endblock %}

{% block content %}
<div class="grid xl:grid-cols-2 gap-6">
  <div class="card-glass">
    <p class="text-xs uppercase tracking-[0.4em] text-yellow-300">Nuevo Pedido</p>

    <form id="orderForm" class="mt-4 space-y-3" novalidate>
      <div class="field">
        <label class="label text-slate-300 text-xs" for="o-client">Cliente *</label>
        <div class="select w-full">
          <select id="o-client" name="client_id" required class="w-full">
            <option value="">Selecciona un cliente…</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div class="field">
          <label class="label text-slate-300 text-xs" for="o-recipient">Destinatario *</label>
          <input id="o-recipient" class="input" type="text" name="recipient_name"
                 placeholder="Ej. Juan Pérez" required minlength="2" maxlength="160">
        </div>
        <div class="field">
          <label class="label text-slate-300 text-xs" for="o-eta">Entrega estimada</label>
          <input id="o-eta" class="input" type="date" name="estimated_delivery">
        </div>
      </div>

      <div class="field">
        <label class="label text-slate-300 text-xs" for="o-destination">Destino *</label>
        <input id="o-destination" class="input" type="text" name="destination"
               placeholder="Ej. Av. Reforma 123 Col. Centro" required minlength="3" maxlength="255">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div class="field">
          <label class="label text-slate-300 text-xs" for="o-city">Ciudad</label>
          <input id="o-city" class="input" type="text" name="city" placeholder="Ej. Orizaba" maxlength="80">
        </div>
        <div class="field">
          <label class="label text-slate-300 text-xs" for="o-state">Estado</label>
          <input id="o-state" class="input" type="text" name="state" placeholder="Ej. Veracruz" maxlength="80">
        </div>
        <div class="field">
          <label class="label text-slate-300 text-xs" for="o-country">País</label>
          <input id="o-country" class="input" type="text" name="country" value="México" maxlength="80">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div class="field">
          <label class="label text-slate-300 text-xs" for="o-weight">Peso total (kg)</label>
          <input id="o-weight" class="input" type="number" name="total_weight_kg"
                 step="0.001" min="0" placeholder="Ej. 12.500">
        </div>
        <div class="field">
          <label class="label text-slate-300 text-xs" for="o-status">Status</label>
          <div class="select w-full">
            <select id="o-status" name="status" class="w-full">
              <option value="pendiente">Pendiente</option>
              <option value="en_proceso">En proceso</option>
              <option value="listo">Listo</option>
              <option value="enviado">Enviado</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="label text-slate-300 text-xs" for="o-notes">Notas</label>
        <textarea id="o-notes" class="textarea" name="notes" rows="2" placeholder="Observaciones, especificaciones..."></textarea>
      </div>

      <!-- Items -->
      <div class="bg-slate-800/50 rounded-xl p-3 mt-4">
        <div class="flex justify-between items-center mb-2">
          <p class="text-xs uppercase tracking-wider text-yellow-300">Piezas del pedido</p>
          <button type="button" id="addItem" class="button is-small is-warning">+ Pieza</button>
        </div>
        <div id="itemsWrap" class="space-y-2"></div>
      </div>

      <button type="submit" class="button is-link is-fullwidth mt-2">Guardar Pedido</button>
    </form>
    <div id="orderMsg" class="mt-3 text-xs"></div>
  </div>

  <div class="card-glass">
    <p class="text-xs uppercase tracking-[0.4em] text-yellow-300">Pedidos existentes</p>
    <div id="ordersList" class="mt-4 space-y-2 text-sm text-slate-300"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
(function(){
  const ITEM_TYPES = ["buje","hule","portachumacera","flecha","maquinado","otro"];
  const form = document.getElementById('orderForm');
  const msg  = document.getElementById('orderMsg');
  const list = document.getElementById('ordersList');
  const itemsWrap = document.getElementById('itemsWrap');
  const clientSel = document.getElementById('o-client');

  function setMsg(t, ok){ msg.textContent = t; msg.style.color = ok ? '#4ade80' : '#f87171'; }

  function addItemRow(){
    const idx = itemsWrap.children.length;
    const row = document.createElement('div');
    row.className = 'grid grid-cols-12 gap-2 items-end';
    row.innerHTML = `
      <div class="col-span-3">
        <label class="text-[10px] text-slate-400">Tipo</label>
        <div class="select is-small w-full"><select class="w-full it-type" required>
          ${ITEM_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}
        </select></div>
      </div>
      <div class="col-span-4">
        <label class="text-[10px] text-slate-400">Descripción *</label>
        <input class="input is-small it-desc" placeholder="Ej. Buje 3/4 bronce" required minlength="1" maxlength="255">
      </div>
      <div class="col-span-2">
        <label class="text-[10px] text-slate-400">Cant. *</label>
        <input class="input is-small it-qty" type="number" min="1" value="1" required>
      </div>
      <div class="col-span-2">
        <label class="text-[10px] text-slate-400">Peso u. (kg)</label>
        <input class="input is-small it-weight" type="number" step="0.001" min="0" placeholder="0.250">
      </div>
      <div class="col-span-1 flex justify-end">
        <button type="button" class="button is-small is-danger rm-item">×</button>
      </div>`;
    row.querySelector('.rm-item').addEventListener('click', () => row.remove());
    itemsWrap.appendChild(row);
  }
  document.getElementById('addItem').addEventListener('click', addItemRow);
  addItemRow();

  async function loadClients(){
    const res = await fetch('/clients/', { credentials:'same-origin' });
    if (!res.ok) return;
    const data = await res.json();
    clientSel.innerHTML = '<option value="">Selecciona un cliente…</option>' +
      data.map(c => `<option value="${c.id}">${c.name} — ${c.phone}</option>`).join('');
  }

  async function loadOrders(){
    const res = await fetch('/orders/', { credentials:'same-origin' });
    if (!res.ok) return;
    const data = await res.json();
    list.innerHTML = '';
    if (!data.length){ list.innerHTML='<div class="text-slate-500 text-xs">Sin pedidos aún.</div>'; return; }
    data.forEach(o => {
      const items = (o.items||[]).map(it => `• ${it.quantity}× ${it.item_type} — ${it.description}`).join('<br>');
      const card = document.createElement('div');
      card.className = 'p-3 bg-slate-800/50 rounded-lg';
      card.innerHTML = `
        <div class="flex justify-between items-center">
          <div>
            <p class="font-semibold">${o.order_code} <span class="text-slate-400 text-xs">· ${o.recipient_name}</span></p>
            <p class="text-xs text-slate-400">${o.destination}${o.city?', '+o.city:''}${o.state?', '+o.state:''}</p>
          </div>
          <span class="text-[10px] px-2 py-0.5 bg-slate-700 rounded uppercase">${o.status}</span>
        </div>
        <div class="text-xs text-slate-300 mt-2">${items||'<i class="text-slate-500">sin piezas</i>'}</div>
        ${o.total_weight_kg?`<div class="text-[11px] text-slate-400 mt-1">Peso total: ${o.total_weight_kg} kg</div>`:''}`;
      list.appendChild(card);
    });
  }

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    if (!form.checkValidity()){ form.reportValidity(); setMsg('Revisa los campos.', false); return; }

    const items = [];
    for (const row of itemsWrap.children){
      items.push({
        item_type: row.querySelector('.it-type').value,
        description: row.querySelector('.it-desc').value.trim(),
        quantity: parseInt(row.querySelector('.it-qty').value || '1', 10),
        unit_weight_kg: parseFloat(row.querySelector('.it-weight').value) || null,
      });
    }
    if (!items.length){ setMsg('Agrega al menos una pieza.', false); return; }

    const fd = new FormData(form);
    const payload = Object.fromEntries(fd.entries());
    payload.client_id = parseInt(payload.client_id, 10);
    payload.total_weight_kg = payload.total_weight_kg ? parseFloat(payload.total_weight_kg) : null;
    if (payload.estimated_delivery) payload.estimated_delivery = new Date(payload.estimated_delivery).toISOString();
    else delete payload.estimated_delivery;
    payload.items = items;

    setMsg('Enviando...', true);
    try {
      const res = await fetch('/orders/', {
        method:'POST', credentials:'same-origin',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
      const body = await res.json().catch(()=>({}));
      if (!res.ok){
        let m = body.detail || 'Error';
        if (Array.isArray(body.detail)) m = body.detail.map(d=>`${d.loc.slice(-1)[0]}: ${d.msg}`).join(' · ');
        throw new Error(m);
      }
      setMsg(`Pedido ${body.order_code} creado ✓`, true);
      form.reset();
      itemsWrap.innerHTML=''; addItemRow();
      loadOrders();
    } catch(err){ setMsg('Error: '+err.message, false); }
  });

  loadClients();
  loadOrders();
})();
</script>
{% endblock %}
